[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# intzzzero.dev(apex)를 정식 도메인으로 사용. www는 apex로 301 리다이렉트.
[[redirects]]
  from = "https://www.intzzzero.dev/*"
  to = "https://intzzzero.dev/:splat"
  status = 301
  force = true

# Astro가 콘텐츠 해시를 붙인 에셋은 영구 캐싱.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # script-src: GA(googletagmanager), AdSense(pagead2), Mermaid(cdn.jsdelivr).
    # connect-src: GA + Mermaid ESM 모듈 fetch.
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://pagead2.googlesyndication.com https://cdn.jsdelivr.net; connect-src 'self' https://*.google-analytics.com https://*.analytics.google.com https://www.googletagmanager.com https://cdn.jsdelivr.net; frame-src https://googleads.g.doubleclick.net https://tpc.googlesyndication.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'"
